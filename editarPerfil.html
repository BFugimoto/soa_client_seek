<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>Editar Perfil</title>
    <script>
        function configurarModalLogin() {
            const perfilBtn = document.querySelector(".perfilIcone");
            const modal = document.getElementById("login-modal");
            const fecharModal = document.getElementById("fechar-login-modal");

            if (!perfilBtn || !modal || !fecharModal) {
                return;
            }

            perfilBtn.addEventListener("click", (event) => {
                modal.classList.add("ativo");
                modal.setAttribute("aria-hidden", "false");
            });
            fecharModal.addEventListener("click", () => {
                modal.classList.remove("ativo");
                modal.setAttribute("aria-hidden", "true");
            });


        }

        window.onload = () => {
            configurarModalLogin();
        };

    </script>
</head>

<body>


    <header>

        <div class="logoSite">
            <a href="index.html">
                <img src="/img/Logo.svg" alt="Logo">
            </a>
        </div>

        <nav>

            <div>
                <a href="index.html">Início</a>
            </div>

            <div>
                <a href="integrantes.html">Integrantes</a>
            </div>

            <!-- <div>
                <a href="login.html">Login</a>
            </div> -->

        </nav>

        <div id="pesquisar">

            <form class="formSearch" action="#">
                <input type="search" name="tipo" placeholder="Pesquisar Usuário">
                <button><img src="/img/search2.svg" alt="Lupa"></button>
            </form>

        </div>

        <button class="perfilIcone" aria-label="Perfil" type="button">
            <img src="/img/user2.svg" alt="Usuário">
        </button>

    </header>

    <main class="mainEdit">
        <h1>Editar Perfil:</h1>
        <form class="formEdit" action="#" method="post">

            <label for="nome">Nome:</label>
            <input class="modalInput" type="text" name="nome" placeholder="Nome" required>
            <label for="email">Email:</label>
            <input class="modalInput" type="email" name="email" placeholder="Email" required>
            <label for="password">Senha:</label>
            <input class="modalInput" type="password" name="password" placeholder="Senha" required>
            <label for="confirmPassword">Confirmar Senha:</label>
            <input class="modalInput" type="password" name="confirmPassword" placeholder="Confirmar Senha" required>

            <button class="form-btn" type="submit">Salvar</button>

        </form>
    </main>

    <div id="login-modal" class="login-modal-overlay" aria-hidden="true">
        <div class="login-modal" role="dialog" aria-modal="true" aria-labelledby="login-modal-texto">
            <button id="fechar-login-modal" class="login-modal-close" type="button" aria-label="Fechar">x</button>
            <p id="login-modal-texto">Voce ainda nao fez login.</p>
            <a class="login-modal-link" href="login.html">Clique aqui para fazer login</a>
        </div>
    </div>

</body>

</html>
