<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/login.css">
    <title>Login</title>
</head>
<body>

    <main class="mainlogin">

        <img src="/img/banner1.jpg" alt="banner" class="bannerLogin">

        <!-- Login -->
        <div class="cardlogin">

            <div class="form-container">

                <img class="logo" src="/img/Group 776.svg" alt="Logo">
                <h2 class="title">Entrar</h2>
                <form action="#" id="loginForm" class="formLogin">

                    <input name="email" id="logInEmail" type="email" placeholder="Email" class="modalInput" required>
                    <input name="password" id="logInPassword" type="password" placeholder="Senha" class="modalInput" required>

                    <button class="form-btn" id="logInBtn" type="submit"><a href="index.html">Entrar</a></button>

                </form>

                <div class="sign-up-label">
                    <button class="sign-up-link" onclick="document.getElementById('sign-up-modal').style.display = 'flex'">Cadastrar</button>
                </div>

            </div>

        </div>

        <!-- Cadastro -->
        <div id="sign-up-modal" class="sign-up-modal">

            <div class="sign-up-content">

                <img class="logo" src="/img/Group 776.svg" alt="Logo">
                <h2 class="title">Cadastrar</h2>
                <span class="fechar" title="Fechar" onclick="document.getElementById('sign-up-modal').style.display = 'none'">&times;</span>

                <form action="#" class="sign-up-form">

                    <input name="nome" type="text" placeholder="Nome" id="cadastroNome" class="modalInput" required>
                    <input name="email" type="email" placeholder="Email" id="cadastroEmail" class="modalInput" required>
                    <input name="password" type="password" placeholder="Senha" id="cadastroSenha" class="modalInput" required>
                    <input name="confirmPassword" type="password" placeholder="Confirmar senha" id="confirmPassword" class="modalInput" required>

                    <button class="form-btn" id="signInBtn" type="submit"><a href="index.html">Cadastrar</a></button>

                </form>

            </div>

        </div>

    </main>

</body>
</html>
